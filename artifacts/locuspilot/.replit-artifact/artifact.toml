kind = "web"
previewPath = "/"
title = "LocusPilot"
version = "1.0.0"
id = "artifacts/locuspilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25323

[services.development]
run = "pnpm --filter @workspace/locuspilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/locuspilot", "run", "build" ]
publicDir = "artifacts/locuspilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25323"
BASE_PATH = "/"
